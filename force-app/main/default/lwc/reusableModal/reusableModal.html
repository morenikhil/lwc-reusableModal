<template>
    <template if:true={isVisible}>
        <!-- Backdrop / Overlay -->
        <div
            class="slds-backdrop slds-backdrop_open"
            data-id="backdrop"
            onclick={handleBackdropClick}
        ></div>

        <!-- Modal Container -->
        <div
            class={computedModalClass}
            role="dialog"
            aria-modal="true"
            aria-labelledby="modal-heading-01"
            aria-describedby="modal-content-id-01"
            data-id="modal"
        >
            <div class="slds-modal__container">

                <!-- Header -->
                <header class="slds-modal__header">
                    <lightning-button-icon
                        class="slds-modal__close"
                        icon-name="utility:close"
                        size="large"
                        variant="bare-inverse"
                        title="Close"
                        alternative-text="Close modal"
                        onclick={handleClose}
                    ></lightning-button-icon>
                    <h2
                        id="modal-heading-01"
                        class="slds-text-heading_medium slds-hyphenate"
                    >
                        <slot name="header">{title}</slot>
                    </h2>
                </header>

                <!-- Body -->
                <div
                    class="slds-modal__content slds-p-around_medium"
                    id="modal-content-id-01"
                >
                    <slot name="body"></slot>
                </div>

                <!-- Footer -->
                <template if:false={hideDefaultFooter}>
                    <footer class="slds-modal__footer">
                        <slot name="footer">
                            <lightning-button
                                variant="neutral"
                                label={cancelLabel}
                                title={cancelLabel}
                                onclick={handleClose}
                                class="slds-m-right_x-small"
                            ></lightning-button>
                            <lightning-button
                                variant="brand"
                                label={confirmLabel}
                                title={confirmLabel}
                                onclick={handleConfirm}
                            ></lightning-button>
                        </slot>
                    </footer>
                </template>

            </div>
        </div>
    </template>
</template>
